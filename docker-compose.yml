services:

  legacy-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legacy_db
    ports:
      - "5433:5432"

  new-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: new_db
    ports:
      - "5434:5432"

  migration:
    build: .
    depends_on:
      - legacy-db
      - new-db